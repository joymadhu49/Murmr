name: Release (macOS + Windows)

# Builds the macOS universal .dmg and Windows .msi/.exe and uploads them
# as assets on the GitHub Release matching the pushed tag (e.g. v0.4.0).
# Linux artifacts are produced locally and uploaded by hand — this workflow
# only covers the OSes we can't build from the Linux dev box.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v0.4.0)'
        required: true
        default: 'v0.4.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin --bundles dmg'
            artifact_glob: 'src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg'
          - platform: windows-latest
            args: '--bundles msi,nsis'
            artifact_glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # whisper-rs needs LLVM for bindgen on Windows
      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install llvm -y

      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install npm deps
        run: npm install

      - name: Tauri build
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          TAG="${{ steps.tag.outputs.tag }}"
          # Make sure the release exists; create as draft if not.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "MyVoice $TAG" --notes "Auto-generated by mac/win build workflow." --draft
          fi
          # Upload every artifact matching the glob(s) for this platform.
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for f in $pattern; do
              if [ -f "$f" ]; then
                echo "uploading $f"
                gh release upload "$TAG" "$f" --clobber
              fi
            done
          done <<< "${{ matrix.artifact_glob }}"
